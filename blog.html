<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeeLog — Blog</title>
  <meta name="description" content="A personal blog sharing thoughts, tutorials, and stories.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://batihanbabacan.com/blog.html">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://batihanbabacan.com/blog.html">
  <meta property="og:title" content="BeeLog — Blog">
  <meta property="og:image" content="https://batihanbabacan.com/favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="blog.css">
  <link rel="icon" type="image/png" href="/favicon-32x32.png">
  <script>
    const _t = localStorage.getItem('baerhub-theme') || 'light';
    if (_t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  </script>
</head>
<body>

<!-- ── Navigation ─────────────────────────────────────────────────────── -->
<nav class="top-nav">
  <div class="nav-container">
    <a href="blog.html" class="nav-logo">bee<span class="accent">log</span></a>
    <button class="nav-hamburger" id="nav-hamburger" aria-label="Menu">
      <i class="fa-solid fa-bars"></i>
    </button>
    <div class="nav-links" id="nav-links">
      <a href="blog.html" class="active">Blog</a>
      <a href="profile.html">Profile</a>
      <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle theme">
        <i class="fa-solid fa-moon"></i>
      </button>
      <div id="nav-user-slot"></div>
    </div>
  </div>
</nav>

<!-- ── Main Layout ────────────────────────────────────────────────────── -->
<main>
  <div class="layout">
    <section>
      <!-- Featured Post -->
      <div id="featured-container"></div>

      <!-- Category Filter -->
      <div class="filter-bar" id="filter-bar">
        <button class="filter-pill active" data-slug="">All</button>
      </div>

      <!-- Post Feed -->
      <div class="feed" id="feed">
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
      </div>

      <div id="feed-sentinel"></div>
      <button class="btn btn-secondary" id="load-more-btn" style="display:none">
        <i class="fa-solid fa-rotate"></i> Load More
      </button>
    </section>

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-card">
        <h3>Categories</h3>
        <ul class="sidebar-cats" id="sidebar-cats">
          <li><a href="#"><span>&nbsp;</span></a></li>
        </ul>
      </div>

      <div class="sidebar-card">
        <h3>About</h3>
        <p style="font-size:.875rem;color:var(--text-2);line-height:1.6">
          A space for thoughts, tutorials, and stories. Written with curiosity.
        </p>
        <a href="profile.html" class="btn btn-secondary btn-sm" style="margin-top:14px;width:100%">
          <i class="fa-solid fa-user"></i> Author Profile
        </a>
      </div>
    </aside>
  </div>
</main>

<button id="scroll-top-btn" aria-label="Back to top" onclick="window.scrollTo({top:0,behavior:'smooth'})">
  <i class="fa-solid fa-arrow-up"></i>
</button>
<div id="toast-container"></div>

<footer class="site-footer">
  &copy; <span id="year"></span> BeeLog &mdash;
  <a href="https://github.com/batihub" target="_blank" rel="noopener">GitHub</a>
</footer>

<script src="auth.js"></script>
<script src="blog.js"></script>
</body>
</html>
