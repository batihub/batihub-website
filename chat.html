<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chat – baerhub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="chat.css">
    <link rel="icon" type="image/png" href="/favicon-32x32.png">
    <script>
        const savedTheme = localStorage.getItem('baerhub-theme') || 'light';
        if (savedTheme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    </script>
</head>
<body>

<nav class="top-nav">
    <div class="nav-container">
        <a href="index.html" class="nav-logo"><span class="bold">baer</span><span class="light">hub</span></a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="blog.html">BeeLog</a>
            <a href="chat.html" class="active">Live Chat</a>
            <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme"><i class="fa-solid fa-moon"></i></button>
            <div id="nav-user-slot" style="position:relative"></div>
            <a href="https://github.com/batihub" target="_blank" class="github-link"><i class="fa-brands fa-github"></i> GitHub</a>
        </div>
    </div>
</nav>

<main class="main-content">
    <div class="chat-wrapper">
        <div class="page-header text-center">
            <h1 class="site-title">Live Rooms</h1>
        </div>

        <div class="chat-container">

            <!-- ══ AUTH PANEL (handled by auth.js global modal) ══ -->
            <div id="auth-panel" class="panel" style="display:none"></div>

            <!-- ══ ROOMS PANEL ══════════════════════════════════════════ -->
            <div id="rooms-panel" class="panel" style="display:none">
                <div class="rooms-header">
                    <h2 style="margin:0">Rooms</h2>
                    <div style="display:flex;gap:8px;align-items:center">
                        <button class="btn btn-secondary btn-sm" onclick="loadRooms()"><i class="fa-solid fa-rotate-right"></i></button>
                        <div class="create-room-fab-wrapper">
                            <button class="create-room-fab" onclick="toggleCreateForm()">
                                <i class="fa-solid fa-plus"></i>
                            </button>
                            <div class="fab-tooltip">Create room</div>
                        </div>
                    </div>
                </div>

                <!-- Create room (hidden by default) -->
                <div id="create-room-form" class="create-room-form" style="display:none">

                    <!-- Mode tabs -->
                    <div class="create-room-tabs">
                        <button class="create-tab active" id="tab-group-btn"   onclick="switchCreateTab('group')">
                            <i class="fa-solid fa-users"></i> Group
                        </button>
                        <button class="create-tab"        id="tab-private-btn" onclick="switchCreateTab('private')">
                            <i class="fa-solid fa-lock"></i> Private DM
                        </button>
                    </div>

                    <!-- Group fields -->
                    <div id="create-group-fields">
                        <input type="text" id="room-name-input" placeholder="Room name (e.g. design-team)" maxlength="32" style="margin-bottom:8px">
                        <input type="text" id="room-desc-input" placeholder="Description (optional)">
                    </div>

                    <!-- Private DM fields -->
                    <div id="create-private-fields" style="display:none">
                        <input type="text" id="dm-username-input" placeholder="Username to start a DM with…" maxlength="50">
                    </div>

                    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px">
                        <button class="btn btn-secondary btn-sm" onclick="toggleCreateForm()">Cancel</button>
                        <button class="btn btn-primary btn-sm" id="create-submit-btn" onclick="handleCreateRoom()">
                            <i class="fa-solid fa-plus"></i> <span id="create-submit-label">Create Group</span>
                        </button>
                    </div>
                </div>
                <div id="room-create-error" class="room-error"></div>

                <!-- Room list -->
                <div id="rooms-list" class="rooms-list">
                    <p class="rooms-loading"><i class="fa-solid fa-spinner fa-spin"></i> Loading rooms…</p>
                </div>
            </div>

            <!-- ══ CHAT PANEL ═══════════════════════════════════════════ -->
            <div id="chat-panel" class="panel" style="display:none">
                <div class="chat-header">
                    <div style="display:flex;align-items:center;gap:10px">
                        <span class="status-dot"></span>
                        <h3 id="room-title" style="margin:0;font-size:1.05rem;font-weight:700"># general</h3>
                        <span class="online-count-badge"><span id="online-count">0</span> online</span>
                    </div>
                    <button class="btn btn-secondary btn-sm" onclick="leaveRoom()">
                        <i class="fa-solid fa-arrow-left"></i> Leave
                    </button>
                </div>

                <!-- Online users strip -->
                <div id="online-list" class="online-strip"></div>

                <div class="chat-box" id="messages"></div>

                <div class="input-area">
                    <input type="text" id="message-input" placeholder="Type a message…">
                    <button class="btn btn-primary btn-icon" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>

        </div>
    </div>
</main>

<script src="auth.js"></script>
<script src="chat.js"></script>
</body>
</html>
