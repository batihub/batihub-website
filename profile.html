<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — BeeLog</title>
  <meta name="description" content="Author profile on BeeLog.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="">
  <meta property="og:type" content="profile">
  <meta property="og:title" content="">
  <meta property="og:description" content="">
  <meta property="og:image" content="">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="blog.css">
  <link rel="stylesheet" href="profile.css">
  <link rel="icon" type="image/png" href="/favicon-32x32.png">
  <script>
    const _t = localStorage.getItem('baerhub-theme') || 'light';
    if (_t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  </script>
</head>
<body>

<!-- ── Navigation ─────────────────────────────────────────────────────── -->
<nav class="top-nav">
  <div class="nav-container">
    <a href="blog.html" class="nav-logo">bee<span class="accent">log</span></a>
    <button class="nav-hamburger" id="nav-hamburger" aria-label="Menu">
      <i class="fa-solid fa-bars"></i>
    </button>
    <div class="nav-links" id="nav-links">
      <a href="blog.html">Blog</a>
      <a href="profile.html" class="active">Profile</a>
      <a href="search.html" class="nav-search-link" title="Search" aria-label="Search"><i class="fa-solid fa-magnifying-glass"></i></a>
      <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle theme">
        <i class="fa-solid fa-moon"></i>
      </button>
      <div id="nav-user-slot"></div>
    </div>
  </div>
</nav>

<!-- ── Profile Layout ─────────────────────────────────────────────────── -->
<div class="profile-layout">

  <!-- Left column: identity card + edit form -->
  <aside class="profile-sidebar">
    <div class="profile-identity-card sidebar-card" id="profile-identity-card">
      <div class="pid-loading">
        <div class="skeleton" style="width:88px;height:88px;border-radius:50%;margin:0 auto 16px"></div>
        <div class="skeleton" style="width:60%;height:22px;margin:0 auto 10px;border-radius:6px"></div>
        <div class="skeleton" style="width:40%;height:14px;margin:0 auto;border-radius:6px"></div>
      </div>
    </div>

    <div id="own-profile-actions" style="display:none">
      <button class="btn btn-secondary" style="width:100%" onclick="toggleEditProfile()">
        <i class="fa-solid fa-pen"></i> Edit Profile
      </button>
    </div>

    <!-- Edit form -->
    <div id="edit-profile-form" class="sidebar-card edit-profile-form" style="display:none">
      <h3 class="edit-profile-title">Edit Profile</h3>
      <div class="edit-field">
        <label>Display Name</label>
        <input type="text" id="ep-displayname" class="settings-input">
      </div>
      <div class="edit-field">
        <label>Bio</label>
        <textarea id="ep-bio" class="settings-input" rows="3" placeholder="Tell readers about yourself…"></textarea>
      </div>
      <div class="edit-field">
        <label>Avatar URL <span style="color:var(--text-3);font-weight:400;font-size:.68rem">(or use camera icon above)</span></label>
        <input type="url" id="ep-avatar" class="settings-input" placeholder="https://…">
      </div>
      <div class="edit-field">
        <label>Website</label>
        <input type="url" id="ep-website" class="settings-input" placeholder="https://…">
      </div>
      <div class="edit-field">
        <label>Twitter / X Handle</label>
        <input type="text" id="ep-twitter" class="settings-input" placeholder="@username">
      </div>
      <div class="edit-actions">
        <button class="btn btn-secondary btn-sm" onclick="toggleEditProfile()">Cancel</button>
        <button class="btn btn-primary btn-sm" onclick="saveProfile()">Save</button>
      </div>
    </div>
  </aside>

  <!-- Right column: posts list -->
  <section class="profile-posts">
    <div class="profile-posts__header">
      <h2 class="view-title" id="posts-section-title">Posts</h2>
    </div>
    <div id="profile-feed" class="profile-post-list">
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
    </div>
    <div id="profile-feed-sentinel"></div>
    <div id="profile-empty" class="feed-empty" style="display:none">
      <i class="fa-regular fa-file-lines"></i>
      <h3>No posts yet</h3>
    </div>
  </section>

</div>

<button id="scroll-top-btn" aria-label="Back to top" onclick="window.scrollTo({top:0,behavior:'smooth'})">
  <i class="fa-solid fa-arrow-up"></i>
</button>
<div id="toast-container"></div>

<footer class="site-footer">
  &copy; <span id="year"></span> BeeLog
</footer>

<script src="auth.js"></script>
<script src="profile.js"></script>
</body>
</html>
