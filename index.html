<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeeLog Site</title>

    <link rel="stylesheet" href="Frontend/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="container">
        <h1>BeeLog Site</h1>

        <h2>Create New Post</h2>
        <form id="create-post-form" onsubmit="event.preventDefault(); createNewPost();">
            <label for="post-title">Title</label>
            <input type="text" id="post-title" required placeholder="Enter the post title">

            <label for="post-content">Content</label>
            <textarea id="post-content" rows="4" required placeholder="Write the full body content here"></textarea>

            <div style="margin-bottom: 15px; margin-top: 15px;">
                <input type="checkbox" id="post-published" checked>
                <label for="post-published" style="display: initial;">Publish Immediately ?</label>
            </div>

            <button type="submit">Create & Publish Post</button>
            <button type="button" onclick="fetchPosts()">Reload Posts</button>
            <p id="post-message" style="margin-top: 10px; font-size: 0.9em;"></p>
        </form>

        <hr>

        <h2>All Posts</h2>
        <div id="posts-container" class="loader">Fetching posts...</div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmation-modal" class="modal">
        <div class="modal-content">
            <p>Silmek istediğinizden emin misiniz?</p>
            <div class="modal-actions">
                <button id="confirm-delete-btn" class="btn-danger">Evet</button>
                <button onclick="closeModal()" class="btn-secondary">Hayır</button>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content" style="width: 90%; max-width: 500px; text-align: left;">
            <h3 style="margin-top: 0;">Edit Post</h3>
            <form id="edit-post-form" onsubmit="event.preventDefault(); submitEditPost();">
                <input type="hidden" id="edit-post-id">

                <label for="edit-post-title">Title</label>
                <input type="text" id="edit-post-title" required
                    style="width: 100%; padding: 8px; margin-bottom: 10px;">

                <label for="edit-post-content">Content</label>
                <textarea id="edit-post-content" rows="6" required
                    style="width: 100%; padding: 8px; margin-bottom: 10px; resize: vertical;"></textarea>

                <div style="margin-bottom: 15px;">
                    <input type="checkbox" id="edit-post-published">
                    <label for="edit-post-published" style="display: initial;">Published</label>
                </div>

                <div class="modal-actions" style="justify-content: flex-end;">
                    <button type="submit" style="background-color: #28a745;">Save</button>
                    <button type="button" onclick="closeEditModal()" class="btn-secondary">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="Frontend/script.js"></script>
</body>

</html>
